name: CI

on:
  push:
    branches: ["**"]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  pack-and-smoke-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Detect tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate template
        shell: pwsh
        run: |
          $packageVersion = "${{ steps.tag.outputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($packageVersion)) {
            .\tools\Validate-Template.ps1 -Configuration $env:CONFIGURATION
          } else {
            .\tools\Validate-Template.ps1 -Configuration $env:CONFIGURATION -PackageVersion $packageVersion
          }

      - name: Upload package artifact
        if: steps.tag.outputs.tag != ''
        uses: actions/upload-artifact@v4
        with:
          name: qaas-runner-template-package
          path: artifacts\package\QaaS.Runner.Template.*.nupkg
