name: CI

on:
  push:
    branches: ["**"]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  PACKAGE_PROJECT: QaaS.Runner.Template.Package.csproj
  TEMPLATE_SHORT_NAME: qaas-runner
  TEMPLATE_SMOKE_NAME: Smoke.QaaS.Runner

jobs:
  pack-and-smoke-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Detect tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack template
        shell: pwsh
        run: |
          $version = if ("${{ steps.tag.outputs.is_tag }}" -eq "true") { "${{ steps.tag.outputs.tag }}" } else { "1.1.0-ci" }
          dotnet pack ${{ env.PACKAGE_PROJECT }} `
            --configuration ${{ env.CONFIGURATION }} `
            -p:PackageVersion=$version `
            --output artifacts

      - name: Install template
        shell: pwsh
        run: |
          $package = Get-ChildItem artifacts\QaaS.Runner.Template.*.nupkg |
            Where-Object { $_.Name -notlike "*.snupkg" } |
            Select-Object -First 1 -ExpandProperty FullName
          dotnet new install $package

      - name: Smoke test template
        shell: pwsh
        run: |
          dotnet new ${{ env.TEMPLATE_SHORT_NAME }} -n ${{ env.TEMPLATE_SMOKE_NAME }} -o smoke
          dotnet build smoke\${{ env.TEMPLATE_SMOKE_NAME }}.sln -c ${{ env.CONFIGURATION }}
          Push-Location smoke\${{ env.TEMPLATE_SMOKE_NAME }}
          dotnet run -c ${{ env.CONFIGURATION }} --no-build --project .\${{ env.TEMPLATE_SMOKE_NAME }}\${{ env.TEMPLATE_SMOKE_NAME }}.csproj -- run test.qaas.yaml
          Pop-Location

      - name: Upload package artifact
        if: steps.tag.outputs.is_tag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: qaas-runner-template-package
          path: artifacts\QaaS.Runner.Template.*.nupkg
